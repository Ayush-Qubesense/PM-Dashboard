<style>
  * { font-family: 'Inter', system-ui, sans-serif; }
  body { margin: 0; background: #f8f7fa; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #d8d6de; border-radius: 2px; }
  .sparkline-path { fill: none; stroke-width: 1.5; stroke-linejoin: round; }
  .gauge-arc { fill: none; stroke-linecap: butt; }
  .risk-badge-Critical  { background:#ffeaea; color:#ea5455; border:1px solid rgba(234,84,85,.3); }
  .risk-badge-High      { background:#fff4e6; color:#ff9f43; border:1px solid rgba(255,159,67,.3); }
  .risk-badge-Medium    { background:#fffbeb; color:#d97706; border:1px solid rgba(217,119,6,.3); }
  .risk-badge-Low       { background:#e6fff2; color:#28c76f; border:1px solid rgba(40,199,111,.3); }
  .score-Critical { color:#ea5455; }
  .score-High     { color:#ff9f43; }
  .score-Medium   { color:#d97706; }
  .score-Low      { color:#28c76f; }
  .row-selected { background:rgba(90,141,238,0.18) !important; }
  .row-selected td { border-bottom-color:#CEDDFA !important; }
  tr.asset-row:hover { background:#f8f7fa; cursor:pointer; }
  .toast { animation: fadeInOut 3s forwards; }
  @keyframes fadeInOut {
    0%   { opacity:0; transform:translateY(-8px); }
    10%  { opacity:1; transform:translateY(0); }
    80%  { opacity:1; }
    100% { opacity:0; }
  }
  .prob-bar { transition: width 0.6s ease; }
  /* Top nav */
  #topNav { overflow: hidden; }
  /* Frest navbar icon buttons */
  .navbar-icon-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    color: #6e6b7b;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .navbar-icon-btn:hover { background: rgba(90,141,238,0.08); color: #5A8DEE; }
  /* Frest nav items */
  .sb-nav-btn { border: none; background: none; cursor: pointer; }
</style>

// Helpers

function riskBadge(risk) {
  return `<span class="risk-badge-${risk} text-[10px] px-1.5 py-0.5 rounded font-semibold">${risk}</span>`
}
function scoreClass(s) {
  return s < 25 ? 'score-Critical' : s < 50 ? 'score-High' : s < 75 ? 'score-Medium' : 'score-Low'
}
function probColor(fp) {
  return fp >= 0.8 ? '#ea5455' : fp >= 0.6 ? '#ff9f43' : fp >= 0.4 ? '#ff9f43' : '#28c76f'
}
function probBg(fp) {
  return fp >= 0.8 ? 'bg-[#ea5455]' : fp >= 0.6 ? 'bg-[#ff9f43]' : fp >= 0.4 ? 'bg-[#ff9f43]' : 'bg-[#28c76f]'
}
function confColor(c) {
  return c === 'High' ? 'text-[#ea5455]' : c === 'Medium' ? 'text-[#ff9f43]' : 'text-[#28c76f]'
}

function sparklineSVG(values) {
  if (!values || values.length < 2) return ''
  const w = 52, h = 20
  const min = Math.min(...values), max = Math.max(...values)
  const range = max - min || 1
  const pts = values.map((v, i) =>
    `${(i / (values.length - 1)) * w},${h - ((v - min) / range) * (h - 4) - 2}`
  ).join(' ')
  const last = values[values.length - 1]
  const color = last >= 75 ? '#28c76f' : last >= 50 ? '#ff9f43' : last >= 25 ? '#ff9f43' : '#ea5455'
  return `<svg width="${w}" height="${h}"><polyline class="sparkline-path" points="${pts}" stroke="${color}"/></svg>`
}

function gaugeSVG(score, label) {
  const cx=80, cy=80, r=60, sw=14
  const toRad = d => d * Math.PI / 180
  const pt = d => ({ x: cx + r * Math.cos(toRad(d)), y: cy + r * Math.sin(toRad(d)) })

  const L = pt(180), R = pt(0)
  const bgPath = `M ${L.x} ${L.y} A ${r} ${r} 0 0 1 ${R.x} ${R.y}`

  const endAngle = 180 + (score / 100) * 180
  const E = pt(endAngle)
  const scorePath = score === 0
    ? ''
    : `M ${L.x} ${L.y} A ${r} ${r} 0 0 1 ${E.x} ${E.y}`

  // Label color based on score
  const color = score >= 75 ? '#28c76f' : score >= 50 ? '#ff9f43' : '#ea5455'

  return `
    <svg width="160" height="90" viewBox="0 0 160 90">
      <defs>
        <linearGradient id="gaugeGrad" x1="${L.x}" y1="0" x2="${R.x}" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#ea5455"/>
          <stop offset="45%"  stop-color="#ff9f43"/>
          <stop offset="100%" stop-color="#28c76f"/>
        </linearGradient>
      </defs>
      <path d="${bgPath}" class="gauge-arc" stroke="#ebe9f1" stroke-width="${sw}"/>
      ${scorePath ? `<path d="${scorePath}" class="gauge-arc" stroke="url(#gaugeGrad)" stroke-width="${sw}"/>` : ''}
      <text x="${cx}" y="60" text-anchor="middle" font-size="26" font-weight="700" fill="#5e5873">${score}</text>
      <text x="${cx}" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="${color}">${label}</text>
    </svg>`
}

function genIcon() {
  return `<img src="/assets/generator.png" class="w-full h-full object-contain" alt="Generator"/>`
}

function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer')
  const d = document.createElement('div')
  const bg = type === 'info'
    ? 'bg-blue-50 border-blue-200 text-blue-700'
    : type === 'success'
    ? 'bg-green-50 border-green-200 text-green-700'
    : 'bg-red-50 border-red-200 text-red-700'
  const icon = type === 'info'
    ? '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'
    : '<polyline points="20 6 9 17 4 12"/>'
  d.className = `toast ${bg} border text-xs px-3 py-2 rounded-lg shadow-sm flex items-center gap-2`
  d.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${icon}</svg>${msg}`
  c.appendChild(d)
  setTimeout(() => d.remove(), 3200)
}

async function loadAssets() {
  const params = new URLSearchParams({ sort: state.sort, page: state.page, limit: 5 })
  if (state.riskFilter) params.set('risk_level', state.riskFilter)
  const res = await fetch((API_BASE || '/api') + '/fleet/assets/health?' + params)
  const data = await res.json()

  const tbody = document.getElementById('assetTableBody')
  tbody.innerHTML = data.assets.map(a => `
    <tr class="asset-row border-b border-[#ebe9f1] transition-colors ${state.selectedId === a.asset_id ? 'row-selected' : ''}"
        data-id="${a.asset_id}">
      <td class="px-4 py-2.5">
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 rounded bg-white flex items-center justify-center flex-shrink-0 border border-[#ebe9f1]">${genIcon()}</div>
          <div>
            <div class="font-semibold text-[#5e5873] text-[11px]">${a.display_name}</div>
            <div class="text-[#b9b9c3] text-[10px]">${a.capacity_kw} kW</div>
          </div>
        </div>
      </td>
      <td class="px-3 py-2.5">
        <div class="font-bold text-sm ${scoreClass(a.health_score)}">${a.health_score}</div>
        ${sparklineSVG(a.sparkline)}
      </td>
      <td class="px-3 py-2.5 whitespace-nowrap">${riskBadge(a.risk_level)}</td>
      <td class="px-3 py-2.5 text-[#6e6b7b] text-[11px] whitespace-nowrap">${a.top_risk_parameter ?? '—'}</td>
      <td class="px-3 py-2.5 text-[#6e6b7b] text-[11px] whitespace-nowrap">${a.predicted_issue ?? '—'}</td>
      <td class="px-3 py-2.5 text-[#6e6b7b] text-[11px] whitespace-nowrap">${a.predicted_eta_label ?? '—'}</td>
    </tr>
  `).join('') || '<tr><td colspan="6" class="text-center py-6 text-[#b9b9c3] text-xs">No assets found</td></tr>'

  // Attach click handlers
  tbody.querySelectorAll('.asset-row').forEach(row => {
    row.addEventListener('click', () => selectAsset(row.dataset.id))
  })

  // Auto-select the first asset until the user picks one themselves
  if (state.selectedId === null && data.assets.length > 0) {
    selectAsset(data.assets[0].asset_id)
  }

  // Pagination info
  const total = data.total
  const start = (state.page - 1) * 5 + 1
  const end = Math.min(state.page * 5, total)
  document.getElementById('pageInfo').textContent = total > 0 ? `${start}–${end} of ${total.toLocaleString()} assets` : '—'

  const totalPages = Math.ceil(total / 5)
  const pageBtns = document.getElementById('pageBtns')

  const WINDOW = 5
  let winStart = Math.max(1, state.page - Math.floor(WINDOW / 2))
  let winEnd = Math.min(totalPages, winStart + WINDOW - 1)
  if (winEnd - winStart + 1 < WINDOW) winStart = Math.max(1, winEnd - WINDOW + 1)

  const btnClass = (active) => `page-btn w-6 h-6 rounded text-[11px] font-medium transition-colors ${active ? 'bg-[#5A8DEE] text-white' : 'text-[#6e6b7b] hover:bg-[#EDF3FD]'}`
  const pageBtn = (p) => `<button data-page="${p}" class="${btnClass(p === state.page)}">${p}</button>`
  const ellipsis = `<span class="text-slate-400 text-xs px-0.5">…</span>`

  let html = ''
  if (winStart > 1) { html += pageBtn(1); if (winStart > 2) html += ellipsis }
  for (let p = winStart; p <= winEnd; p++) html += pageBtn(p)
  if (winEnd < totalPages) { if (winEnd < totalPages - 1) html += ellipsis; html += pageBtn(totalPages) }

  pageBtns.innerHTML = html
  pageBtns.querySelectorAll('.page-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.page = +btn.dataset.page; loadAssets() })
  })
}

function timeAgo(isoStr) {
  if (!isoStr) return 'Unknown'
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 60000)
  if (diff < 1) return 'Just now'
  if (diff < 60) return `${diff} min ago`
  if (diff < 1440) return `${Math.floor(diff / 60)} hr ago`
  return `${Math.floor(diff / 1440)}d ago`
}

function riskBadgeFull(risk) {
  const cls = { Critical: 'bg-[#ea5455] text-white', High: 'bg-[#ff9f43] text-white', Medium: 'bg-[#ff9f43] text-white', Low: 'bg-[#28c76f] text-white' }
  return `<span class="text-xs px-2 py-0.5 rounded font-semibold ${cls[risk]}">${risk} Risk</span>`
}

const REC_COLORS = {
  CREATE_WO: 'bg-[#ea5455] hover:bg-[#e04244] text-white',
  ADJUST_PM: 'bg-[#5A8DEE] hover:bg-[#3D74E0] text-white',
  ADD_TASK:  'bg-[#6e6b7b] hover:bg-[#5e5873] text-white',
  MONITOR:   'bg-[#82868b] hover:bg-[#74787d] text-white',
}

async function selectAsset(id) {
  state.selectedId = id
  // Highlight row
  document.querySelectorAll('.asset-row').forEach(r => r.classList.toggle('row-selected', r.dataset.id === id))

  const panel = document.getElementById('detailPanel')
  panel.innerHTML = '<div class="flex items-center justify-center h-full text-slate-400 text-xs">Loading...</div>'
  document.getElementById('recsPanel').innerHTML = '<p class="text-xs text-slate-400 text-center py-3">Loading...</p>'
  document.getElementById('viewAllRecs').classList.add('hidden')

  const [detail, recs] = await Promise.all([
    fetch(`${API_BASE || '/api'}/assets/${id}/detail`).then(r => r.json()),
    fetch(`${API_BASE || '/api'}/assets/${id}/recommendations`).then(r => r.json()),
  ])

  renderDetail(detail, panel)
  renderRecs(recs)
}

function renderDetail(d, panel) {
  const t = d.latest_telemetry
  const p = d.prediction
  const fp = p.failure_probability
  const fpPct = Math.round(fp * 100)

  panel.innerHTML = `
    <div class="px-4 pt-4 pb-3 border-b border-[#ebe9f1] flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-bold text-[#5e5873]">${d.display_name}</span>
        ${riskBadgeFull(d.risk_level)}
      </div>
      <span class="text-xs text-[#b9b9c3]">${d.capacity_kw} kW</span>
    </div>

    <div class="relative border-b border-[#ebe9f1]">
      <img src="/assets/generator.png" class="w-full h-44 object-contain bg-[#f8f7fa]" alt="Generator"/>
      ${d.risk_level === 'Critical' || d.risk_level === 'High' ?
        '<div class="absolute top-2 right-2 w-5 h-5 bg-[#ea5455] rounded-full flex items-center justify-center text-white text-xs font-bold">!</div>' : ''}
    </div>

    <div class="grid grid-cols-3 gap-2 px-4 py-2 border-b border-[#ebe9f1] text-[10px] text-[#6e6b7b]">
      <div class="flex items-center gap-1">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5A8DEE" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${d.location_city}, ${d.location_state}
      </div>
      <div class="flex items-center gap-1">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5A8DEE" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${t.runtime_hours ? Math.round(t.runtime_hours).toLocaleString() + ' hrs' : '—'}
      </div>
      <div class="flex items-center gap-1">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5A8DEE" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6"/><path d="M22 11.5A10 10 0 0 0 3.2 7.2M2 12.5a10 10 0 0 0 18.8 4.2"/></svg>
        ${timeAgo(t.recorded_at)}
      </div>
    </div>

    <div class="px-4 py-3 border-b border-[#ebe9f1]">
      <h3 class="text-[10px] font-semibold text-[#5e5873] mb-1">AI Risk Summary</h3>
      <p class="text-[11px] text-[#6e6b7b] leading-relaxed">${d.ai_risk_summary}</p>
    </div>

    <div class="px-4 py-3 border-b border-[#ebe9f1] space-y-2.5">
      <div>
        <div class="flex justify-between text-[10px] mb-1">
          <span class="text-[#6e6b7b] font-medium">Failure Probability</span>
          <span class="font-bold ${fp >= 0.8 ? 'text-[#ea5455]' : fp >= 0.5 ? 'text-[#ff9f43]' : 'text-[#28c76f]'}">${fpPct}%</span>
        </div>
        <div class="h-2 bg-[#ebe9f1] rounded-full overflow-hidden">
          <div class="prob-bar h-full rounded-full ${probBg(fp)}" style="width:${fpPct}%"></div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2 text-[10px]">
        <div>
          <span class="text-[#6e6b7b]">Predicted Time to Failure</span>
          <div class="font-semibold text-[#5e5873] mt-0.5">${p.predicted_eta_label ?? 'No imminent failure'}</div>
        </div>
        <div>
          <span class="text-[#6e6b7b]">Confidence</span>
          <div class="font-semibold mt-0.5 ${confColor(p.confidence_level)}">${p.confidence_level}</div>
        </div>
      </div>
    </div>

    ${p.contributing_factors.length ? `
    <div class="px-4 py-3 border-b border-[#ebe9f1]">
      <h3 class="text-[10px] font-semibold text-[#5e5873] mb-2">Contributing Factors</h3>
      <ul class="space-y-1.5">
        ${p.contributing_factors.map(f => `
          <li class="flex items-start gap-2 text-[10px]">
            <span class="mt-1 w-1.5 h-1.5 rounded-full bg-[#ea5455] flex-shrink-0"></span>
            <span class="text-[#6e6b7b]"><span class="font-medium text-[#5e5873]">${f.parameter}</span> — ${f.deviation}</span>
          </li>`).join('')}
      </ul>
    </div>` : ''}

    <div class="px-4 py-3">
      <h3 class="text-[10px] font-semibold text-[#5e5873] mb-2">Live Telemetry</h3>
      <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-[10px]">
        ${telRow('Coolant Temp', t.coolant_temp_f != null ? t.coolant_temp_f.toFixed(1) + '°F' : null)}
        ${telRow('Oil Pressure', t.oil_pressure_psi != null ? t.oil_pressure_psi.toFixed(1) + ' PSI' : null)}
        ${telRow('Engine RPM', t.rpm != null ? Math.round(t.rpm).toLocaleString() : null)}
        ${telRow('kW Output', t.kw_output != null ? t.kw_output.toFixed(0) + ' kW' : null)}
        ${telRow('Voltage A', t.voltage_a != null ? t.voltage_a.toFixed(1) + ' V' : null)}
        ${telRow('Frequency', t.frequency_hz != null ? t.frequency_hz.toFixed(2) + ' Hz' : null)}
        ${telRow('Power Factor', t.power_factor != null ? t.power_factor.toFixed(3) : null)}
        ${telRow('Fuel Type', t.fuel_type)}
      </div>
    </div>
  `
}

function telRow(label, val) {
  return `<div class="flex justify-between"><span class="text-[#b9b9c3]">${label}</span><span class="font-medium text-[#5e5873]">${val ?? '—'}</span></div>`
}

const recIcons = {
  CREATE_WO: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  ADJUST_PM: '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  ADD_TASK:  '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
  MONITOR:   '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
}

function renderRecs(recs) {
  const panel = document.getElementById('recsPanel')
  const viewAll = document.getElementById('viewAllRecs')

  if (!recs.recommendations.length) {
    panel.innerHTML = '<p class="text-xs text-slate-400 text-center py-3">No recommendations</p>'
    viewAll.classList.add('hidden')
    return
  }

  panel.innerHTML = recs.recommendations.map(r => {
    const done = state.acceptedRecs.has(r.rec_id)
    const icon = recIcons[r.rec_type] ?? recIcons.MONITOR
    const btnClass = done ? '' : (REC_COLORS[r.rec_type] ?? REC_COLORS.MONITOR)
    return `
      <div class="flex items-start gap-3 p-3 rounded-lg border transition-all ${done ? 'border-[#28c76f]/30 bg-[#28c76f]/5 opacity-70' : 'border-[#ebe9f1] bg-[#f8f7fa]'}" data-rec-id="${r.rec_id}" data-rec-title="${r.title}">
        <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5 ${done ? 'bg-[#28c76f]/10' : 'bg-[#5A8DEE]/10'}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${done ? '#28c76f' : '#5A8DEE'}" stroke-width="2">${done ? '<polyline points="20 6 9 17 4 12"/>' : icon}</svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-semibold text-[#5e5873] mb-0.5">${r.title}</div>
          <div class="text-[10px] text-[#6e6b7b] leading-relaxed line-clamp-2">${r.description}</div>
          <div class="mt-2">
            ${done
              ? '<span class="text-[10px] text-[#28c76f] font-medium">Done</span>'
              : `<button class="rec-accept-btn text-[10px] px-2.5 py-1 rounded-lg font-semibold transition-colors ${btnClass}">${r.action_label}</button>`
            }
          </div>
        </div>
      </div>
    `
  }).join('')

  // Accept buttons
  panel.querySelectorAll('.rec-accept-btn').forEach(btn => {
    const card = btn.closest('[data-rec-id]')
    btn.addEventListener('click', async () => {
      const rid = card.dataset.recId
      const title = card.dataset.recTitle
      await fetch(`${API_BASE || '/api'}/recommendations/${rid}/accept`, { method: 'POST' })
      state.acceptedRecs.add(rid)
      showToast(`"${title}" submitted successfully`)
      renderRecs(recs)
    })
  })

  viewAll.classList.remove('hidden')
  viewAll.style.display = 'flex'

  // PM Job
  renderPM(recs.pm_job)
}

function renderPM(job) {
  const panel = document.getElementById('pmPanel')
  if (!job) {
    panel.innerHTML = `
      <div class="flex flex-col items-center gap-2 py-3">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d8d6de" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <p class="text-xs text-[#b9b9c3]">No PM adjustments for this asset</p>
      </div>`
    return
  }
  const scopePct = 100 - job.adjustment_pct
  panel.innerHTML = `
    <div class="space-y-3">
      <div class="flex items-center gap-2">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5A8DEE" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span class="text-xs font-semibold text-[#5e5873]">${job.job_code} – ${job.job_name}</span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <p class="text-[10px] text-[#6e6b7b] mb-0.5">Original Due</p>
          <p class="text-xs font-semibold text-[#5e5873]">${job.original_due_date}</p>
        </div>
        <div>
          <p class="text-[10px] text-[#6e6b7b] mb-0.5">Adjusted Due</p>
          <p class="text-xs font-semibold text-[#ff9f43]">${job.adjusted_due_date}</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="flex items-center gap-1 text-[10px] bg-[#fff4e6] border border-[rgba(255,159,67,.3)] text-[#ff9f43] px-2 py-0.5 rounded-lg font-medium">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          ${job.adjustment_pct}% shorter
        </span>
        <span class="text-[10px] text-[#6e6b7b]">${job.adjustment_reason}</span>
      </div>
      <div class="space-y-1.5">
        <div>
          <p class="text-[10px] text-[#6e6b7b] mb-0.5">Original Scope</p>
          <div class="h-1.5 bg-[#ebe9f1] rounded-full overflow-hidden">
            <div class="h-full bg-[#5A8DEE] rounded-full" style="width:100%"></div>
          </div>
        </div>
        <div>
          <p class="text-[10px] text-[#6e6b7b] mb-0.5">Adjusted Scope</p>
          <div class="h-1.5 bg-[#ebe9f1] rounded-full overflow-hidden">
            <div class="h-full bg-[#ff9f43] rounded-full" style="width:${scopePct}%"></div>
          </div>
        </div>
      </div>
    </div>`
}

// ═══════════════════════════════════════════════════════
// Filter controls
// ═══════════════════════════════════════════════════════
document.getElementById('filterToggle').addEventListener('click', () => {
  document.getElementById('filterPanel').classList.toggle('hidden')
})

document.getElementById('sortSelect').addEventListener('change', e => {
  state.sort = e.target.value
  state.page = 1
  loadAssets()
})

document.querySelectorAll('.risk-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const risk = btn.dataset.risk
    if (state.riskFilter === risk) {
      state.riskFilter = null
      btn.className = 'risk-filter-btn text-xs px-2 py-1 rounded border border-slate-200 text-slate-500 hover:bg-slate-50'
    } else {
      state.riskFilter = risk
      document.querySelectorAll('.risk-filter-btn').forEach(b => {
        b.className = 'risk-filter-btn text-xs px-2 py-1 rounded border border-[#d8d6de] text-[#6e6b7b] hover:bg-[#f8f7fa]'
      })
      btn.className = `risk-filter-btn risk-badge-${risk} text-xs px-2 py-1 rounded font-semibold`
    }
    state.page = 1
    loadAssets()
  })
})

let searchTimeout
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout)
  searchTimeout = setTimeout(() => {
    state.page = 1
    loadAssets()
  }, 300)
})

// ═══════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════
loadKPIs()
loadAssets()
</script>
</body>
</html>
